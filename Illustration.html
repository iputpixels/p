<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Portfolio - Illustrations</title>
    <style>
        /* General styling */
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300&display=swap');

        body {
            margin: 0;
            overflow-x: hidden;
            font-family: 'Roboto Condensed', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #f5f5f5;
            min-height: 100vh;
            animation: gradientShift 15s ease infinite;
            background-size: 400% 400%;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Canvas for particles */
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease;
        }

        canvas.visible {
            opacity: 0.7;
        }

        /* Content styling */
        .content-wrapper {
            position: relative;
            z-index: 1;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
            max-width: 1000px;
            margin: 20px auto;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
        }

        .content.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Page transition elements */
        .page-transition-overlay {
            position: fixed;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            z-index: 1000;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .page-transition-overlay.active {
            transform: translateX(100%);
        }

        .content-wrapper.sliding {
            transform: translateX(100%);
        }

        /* Image viewer styles */
        .image-viewer-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .image-viewer-container {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
        }

        .image-viewer-img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            transform-origin: center;
            transition: transform 0.3s ease;
        }

        .close-viewer {
            position: absolute;
            top: -40px;
            right: 0;
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 10px;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .close-viewer:hover {
            opacity: 1;
        }

        .zoom-controls {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .zoom-controls button {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 4px;
        }

        .zoom-controls button:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .content h1 {
            font-size: 3.5rem;
            color: #00bfff;
            margin-bottom: 40px;
            letter-spacing: 0.2rem;
            text-shadow: 0 0 20px rgba(0, 191, 255, 0.5);
        }

        .price-list {
            margin: 40px auto;
            width: 100%;
            max-width: 800px;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        .price-list th, .price-list td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .price-list th {
            background: rgba(0, 191, 255, 0.1);
            color: #00bfff;
            font-size: 1.2rem;
        }

        .price-list td:last-child {
            text-align: right;
            color: #00bfff;
            font-weight: bold;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .gallery img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .social-links a {
            color: #00bfff;
            text-decoration: none;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .social-links a:hover {
            transform: translateY(-3px);
            text-shadow: 0 0 10px rgba(0, 191, 255, 0.5);
        }

        .notice {
            margin: 30px 0;
            padding: 15px;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(255, 0, 0, 0.2);
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(0, 191, 255, 0.1);
            border: 1px solid rgba(0, 191, 255, 0.5);
            border-radius: 8px;
            color: #f5f5f5;
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .back-button:hover {
            background: rgba(0, 191, 255, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <a href="#" onclick="pageTransition.navigate('index.html'); return false;" class="back-button">← Back</a>
    
    <div class="content-wrapper">
        <div class="content">
            <h1>Illustration Commissions</h1>
            
            <table class="price-list">
                <tr>
                    <th>Type</th>
                    <th>Price</th>
                </tr>
                <tr>
                    <td>Full body full render + background</td>

                </tr>
                <tr>
                    <td>Full body full render + simple background</td>
                    <td>$30</td>
                </tr>
            </table>
            
            <p style="color: rgba(255, 255, 255, 0.7); font-style: italic;">
                * Prices may vary depending on deadlines and complexity
            </p>

            <div class="notice">
                <h3>I WILL NOT DRAW</h3>
                <p>• Furry content<br>• NSFW content</p>
            </div>

            <h2 style="color: #00bfff; margin-top: 40px;">Examples of My Work</h2>
            <div class="gallery">
                <img src="assets/Illustration/illustration1.jpg" alt="Ganyu drinking boba" onclick="openImageViewer(this.src, this.alt)">
                <img src="assets/Illustration/illustration2.jpg" alt="Mona commission" onclick="openImageViewer(this.src, this.alt)">
            </div>

            <div class="social-links">
                <a href="https://x.com/iputpixels" target="_blank">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/>
                    </svg>
                    Twitter
                </a>
                <a href="https://www.pixiv.net/en/users/68845905" target="_blank">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <path d="M12 8v8M8 12h8"/>
                    </svg>
                    Pixiv
                </a>
                <a href="mailto:ytimrdx@gmail.com">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <path d="M22 6l-10 7L2 6"/>
                    </svg>
                    Email
                </a>
            </div>
        </div>
    </div>

    <!-- Image Viewer -->
    <div class="image-viewer-overlay" id="imageViewer">
        <div class="image-viewer-container">
            <button class="close-viewer" onclick="closeImageViewer()">×</button>
            <img class="image-viewer-img" id="viewerImage" src="" alt="">
            <div class="zoom-controls">
                <button onclick="zoomImage(-0.1)">-</button>
                <button onclick="resetZoom()">Reset</button>
                <button onclick="zoomImage(0.1)">+</button>
            </div>
        </div>
    </div>

    <script>
        // Page transition system
        const pageTransition = {
            init() {
                const overlay = document.createElement('div');
                overlay.className = 'page-transition-overlay';
                document.body.appendChild(overlay);
            },

            async navigate(url) {
                const overlay = document.querySelector('.page-transition-overlay');
                const content = document.querySelector('.content-wrapper');
                overlay.classList.add('active');
                content.classList.add('sliding');
                await new Promise(resolve => setTimeout(resolve, 600));
                window.location.href = url;
            }
        };

        // Initialize transition system
        document.addEventListener('DOMContentLoaded', () => {
            pageTransition.init();
        });

        // Initial animations
        window.addEventListener('load', () => {
            document.querySelector('canvas').classList.add('visible');
            document.querySelector('.content').classList.add('visible');
        });

        // Image viewer functionality
        let currentZoom = 1;
        const viewer = document.getElementById('imageViewer');
        const viewerImage = document.getElementById('viewerImage');

        function openImageViewer(src, alt) {
            viewer.style.display = 'flex';
            viewerImage.src = src;
            viewerImage.alt = alt;
            currentZoom = 1;
            updateZoom();
        }

        function closeImageViewer() {
            viewer.style.display = 'none';
            currentZoom = 1;
            updateZoom();
        }

        function zoomImage(delta) {
            currentZoom = Math.min(Math.max(currentZoom + delta, 0.5), 3);
            updateZoom();
        }

        function resetZoom() {
            currentZoom = 1;
            updateZoom();
        }

        function updateZoom() {
            viewerImage.style.transform = `scale(${currentZoom})`;
        }

        // Close viewer when clicking outside the image
        viewer.addEventListener('click', function(e) {
            if (e.target === viewer) {
                closeImageViewer();
            }
        });

        // Add keyboard controls
        document.addEventListener('keydown', function(e) {
            if (viewer.style.display === 'flex') {
                if (e.key === 'Escape') {
                    closeImageViewer();
                } else if (e.key === '+' || e.key === '=') {
                    zoomImage(0.1);
                } else if (e.key === '-') {
                    zoomImage(-0.1);
                } else if (e.key === '0') {
                    resetZoom();
                }
            }
        });

        // Particle system
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particlesArray = [];
        const mouse = { x: null, y: null };

        canvas.addEventListener('mousemove', event => {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        class Particle {
            constructor(x, y, size, speedX, speedY) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.speedX = speedX;
                this.speedY = speedY;
                this.alpha = Math.random() * 0.5 + 0.5;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.fill();
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
            }
        }

        function connectParticles() {
            for (let i = 0; i < particlesArray.length; i++) {
                for (let j = i + 1; j < particlesArray.length; j++) {
                    const dx = particlesArray[i].x - particlesArray[j].x;
                    const dy = particlesArray[i].y - particlesArray[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 100 && mouse.x !== null) {
                        const mouseDx = particlesArray[i].x - mouse.x;
                        const mouseDy = particlesArray[i].y - mouse.y;
                        const mouseDistance = Math.sqrt(mouseDx * mouseDx + mouseDy * mouseDy);

                        if (mouseDistance < 150) {
                            ctx.beginPath();
                            ctx.strokeStyle = 'rgba(0, 191, 255, 0.15)';
                            ctx.lineWidth = 1;
                            ctx.moveTo(particlesArray[i].x, particlesArray[i].y);
                            ctx.lineTo(particlesArray[j].x, particlesArray[j].y);
                            ctx.stroke();
                        }
                    }
                }
            }
        }

        function initParticles() {
            particlesArray.length = 0;
            const numParticles = 100;
            for (let i = 0; i < numParticles; i++) {
                const size = Math.random() * 5 + 1;
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const speedX = (Math.random() - 0.5) * 2;
                const speedY = (Math.random() - 0.5) * 2;
                particlesArray.push(new Particle(x, y, size, speedX, speedY));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach(particle => {
                particle.update();
                particle.draw();
            });
            connectParticles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        initParticles();
        animate();
    </script>
</body>
</html>
