<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">	
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Portfolio - Thumbnails</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300&display=swap');

        body {
            margin: 0;
            overflow-x: hidden;
            font-family: 'Roboto Condensed', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #f5f5f5;
            min-height: 100vh;
            animation: gradientShift 15s ease infinite;
            background-size: 400% 400%;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease;
        }

        canvas.visible {
            opacity: 0.7;
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
            max-width: 1000px;
            margin: 20px auto;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
        }

        .content.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .content h1 {
            font-size: 3.5rem;
            color: #00bfff;
            margin-bottom: 40px;
            letter-spacing: 0.2rem;
            text-shadow: 0 0 20px rgba(0, 191, 255, 0.5);
        }

        .price-table {
            margin: 40px auto;
            width: 100%;
            max-width: 800px;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        .price-table th, .price-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .price-table th {
            background: rgba(0, 191, 255, 0.1);
            color: #00bfff;
            font-size: 1.2rem;
        }

        .price-table td:last-child {
            text-align: right;
            color: #00bfff;
            font-weight: bold;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 40px 0;
        }

        .gallery img {
            width: 100%;
            height: auto;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(0, 191, 255, 0.1);
            border: 1px solid rgba(0, 191, 255, 0.5);
            border-radius: 8px;
            color: #f5f5f5;
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .back-button:hover {
            background: rgba(0, 191, 255, 0.2);
            transform: translateY(-2px);
        }

        .note {
            color: rgba(255, 255, 255, 0.7);
            font-style: italic;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <a href="#" onclick="pageTransition.navigate('index.html'); return false;" class="back-button">← Back</a>
    <div class="content-wrapper">
        <div class="content">
            <h1>Thumbnail Commissions</h1>
            
            <table class="price-table">
                <tr>
                    <th>Payment Method</th>
                    <th>Price</th>
                </tr>
                <tr>
                    <td>One-time payment per thumbnail</td>
                    <td>$20</td>
                </tr>
                <tr>
                    <td>Hourly rate</td>
                    <td>$7/hour</td>
                </tr>
            </table>
            
            <p class="note">* Prices may vary depending on deadlines and complexity</p>

            <h2 style="color: #00bfff; margin-top: 40px;">Examples of My Work</h2>
            <p>Resolution: 1280 × 720</p>
            <div class="gallery">
                <img src="assets/Thumbnails/Virus.jpg" alt="Thumbnail example 1">
                <img src="assets/Thumbnails/Value.jpg" alt="Thumbnail example 2">
                <img src="assets/Thumbnails/iman-ghadzi.jpg" alt="Thumbnail example 3">
                <img src="/api/placeholder/1280/720" alt="Thumbnail example 4">
            </div>
        </div>
    </div>

    <script>
        // Page transition system
        const pageTransition = {
            init() {
                const overlay = document.createElement('div');
                overlay.className = 'page-transition-overlay';
                document.body.appendChild(overlay);
            },

            async navigate(url) {
                const overlay = document.querySelector('.page-transition-overlay');
                const content = document.querySelector('.content-wrapper');
                overlay.classList.add('active');
                content.classList.add('sliding');
                await new Promise(resolve => setTimeout(resolve, 600));
                window.location.href = url;
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            pageTransition.init();
        });

        window.addEventListener('load', () => {
            document.querySelector('canvas').classList.add('visible');
            document.querySelector('.content').classList.add('visible');
        });

        // Particle system
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particlesArray = [];
        const mouse = { x: null, y: null };

        canvas.addEventListener('mousemove', event => {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        class Particle {
            constructor(x, y, size, speedX, speedY) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.speedX = speedX;
                this.speedY = speedY;
                this.alpha = Math.random() * 0.5 + 0.5;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.fill();
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
            }
        }

        function connectParticles() {
            for (let i = 0; i < particlesArray.length; i++) {
                for (let j = i + 1; j < particlesArray.length; j++) {
                    const dx = particlesArray[i].x - particlesArray[j].x;
                    const dy = particlesArray[i].y - particlesArray[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 100 && mouse.x !== null) {
                        const mouseDx = particlesArray[i].x - mouse.x;
                        const mouseDy = particlesArray[i].y - mouse.y;
                        const mouseDistance = Math.sqrt(mouseDx * mouseDx + mouseDy * mouseDy);

                        if (mouseDistance < 150) {
                            ctx.beginPath();
                            ctx.strokeStyle = 'rgba(0, 191, 255, 0.15)';
                            ctx.lineWidth = 1;
                            ctx.moveTo(particlesArray[i].x, particlesArray[i].y);
                            ctx.lineTo(particlesArray[j].x, particlesArray[j].y);
                            ctx.stroke();
                        }
                    }
                }
            }
        }

        function initParticles() {
            particlesArray.length = 0;
            const numParticles = 100;
            for (let i = 0; i < numParticles; i++) {
                const size = Math.random() * 5 + 1;
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const speedX = (Math.random() - 0.5) * 2;
                const speedY = (Math.random() - 0.5) * 2;
                particlesArray.push(new Particle(x, y, size, speedX, speedY));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach(particle => {
                particle.update();
                particle.draw();
            });
            connectParticles();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        initParticles();
        animate();
    </script>
</body>
</html>
